<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>In tem — LàSilk</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── PREVIEW UI (ẩn khi in) ── */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f5f5f5; }

.ui { max-width: 480px; margin: 0 auto; padding: 20px 16px; }
.ui-title { font-size: 18px; font-weight: 500; color: #2a2118; margin-bottom: 4px; }
.ui-sub { font-size: 13px; color: #9a8880; margin-bottom: 20px; }

.product-info-card { background: #fff; border-radius: 12px; border: 1px solid #ede5e1; padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
.p-swatch { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.07); }
.p-name { font-size: 15px; font-weight: 500; color: #2a2118; }
.p-meta { font-size: 12px; color: #9a8880; margin-top: 2px; }
.p-code { font-size: 11px; color: #c4b8b2; font-family: monospace; margin-top: 2px; }

.qty-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; background: #fff; border-radius: 12px; border: 1px solid #ede5e1; padding: 14px 16px; }
.qty-row label { font-size: 14px; font-weight: 500; color: #2a2118; flex: 1; }
.qty-ctrl { display: flex; align-items: center; gap: 10px; }
.q-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #ddd0ca; background: #fdf8f6; font-size: 18px; cursor: pointer; color: #5a4a3f; display: flex; align-items: center; justify-content: center; }
.q-btn:active { background: #f5ede9; }
.q-input { width: 56px; text-align: center; font-size: 18px; font-weight: 500; border: 1px solid #ddd0ca; border-radius: 8px; padding: 6px; color: #2a2118; }
.q-input:focus { outline: none; border-color: #b07d6b; }

.preview-label { font-size: 11px; font-weight: 500; color: #9a8880; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
.preview-grid { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 16px; max-height: 280px; overflow-y: auto; background: #fff; border-radius: 12px; border: 1px solid #ede5e1; padding: 12px; }

.btn-print-now { width: 100%; background: #2a2118; color: #fff; border: none; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; margin-bottom: 10px; }
.btn-print-now:active { background: #5a4a3f; }
.btn-back { width: 100%; background: #f5ede9; color: #9a6a58; border: none; padding: 12px; border-radius: 12px; font-size: 14px; cursor: pointer; font-family: 'Inter', sans-serif; }
.hint { font-size: 12px; color: #c4b8b2; text-align: center; margin-top: 10px; line-height: 1.6; }

/* ── TEM THẬT (chỉ hiện khi in) ── */
/* Khổ 25×15mm, 3 cột */
@media screen {
  .print-area { display: none; }
}

@media print {
  .ui { display: none !important; }
  .print-area { display: block; }

  @page {
    size: A4 portrait;
    margin: 8mm 6mm;
  }

  body { background: #fff; }

  .tem-grid {
    display: grid;
    grid-template-columns: repeat(3, 25mm);
    gap: 1mm 2mm;
  }

  .tem {
    width: 25mm;
    height: 15mm;
    display: flex;
    align-items: stretch;
    overflow: hidden;
    border: 0.3pt solid #ccc;
    border-radius: 1mm;
    page-break-inside: avoid;
  }

  .tem-bar {
    width: 4mm;
    background: #b07d6b;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .tem-bar-text {
    font-size: 3pt;
    color: #fff;
    font-weight: 700;
    writing-mode: vertical-lr;
    transform: rotate(180deg);
    letter-spacing: 0.3pt;
    font-family: serif;
  }

  .tem-qr {
    width: 13mm;
    height: 13mm;
    margin: 1mm 0.5mm;
    flex-shrink: 0;
  }
  .tem-qr img {
    width: 13mm !important;
    height: 13mm !important;
    display: block;
  }

  .tem-info {
    flex: 1;
    padding: 1mm 1mm 1mm 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-width: 0;
    overflow: hidden;
  }
  .tem-name {
    font-size: 4.5pt;
    font-weight: 600;
    color: #1a1a1a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
    font-family: 'Inter', sans-serif;
  }
  .tem-color {
    font-size: 3.5pt;
    color: #555;
    margin-top: 0.3mm;
    line-height: 1.2;
    font-family: 'Inter', sans-serif;
  }
  .tem-code {
    font-size: 3pt;
    color: #999;
    margin-top: 0.5mm;
    font-family: monospace;
  }
  .tem-made {
    font-size: 3pt;
    color: #b07d6b;
    font-style: italic;
    margin-top: 0.3mm;
    font-family: serif;
  }
}
</style>
</head>
<body>

<!-- UI PREVIEW -->
<div class="ui">
  <div class="ui-title">In tem sản phẩm</div>
  <div class="ui-sub">Khổ 25 × 15mm · 3 cột/hàng</div>

  <div class="product-info-card">
    <div class="p-swatch" id="ui-swatch"></div>
    <div>
      <div class="p-name" id="ui-name">—</div>
      <div class="p-meta" id="ui-meta">—</div>
      <div class="p-code" id="ui-code">—</div>
    </div>
  </div>

  <div class="qty-row">
    <label>Số lượng tem cần in</label>
    <div class="qty-ctrl">
      <button class="q-btn" onclick="changeQty(-1)">−</button>
      <input class="q-input" type="number" id="qty-in" value="1" min="1" max="300" onchange="updatePreview()">
      <button class="q-btn" onclick="changeQty(1)">+</button>
    </div>
  </div>

  <div class="preview-label">Xem trước tem</div>
  <div class="preview-grid" id="preview-grid"></div>

  <button class="btn-print-now" onclick="window.print()">🖨 In ngay (Ctrl+P)</button>
  <button class="btn-back" onclick="history.back()">← Quay lại</button>
  <div class="hint">Khi hộp thoại in hiện ra:<br>chọn đúng máy in Shoptida · tắt "Headers and footers" · Scale = 100%</div>
</div>

<!-- VÙNG IN THẬT -->
<div class="print-area">
  <div class="tem-grid" id="print-grid"></div>
</div>

<script>
// Lấy thông tin sản phẩm từ URL params
const params = new URLSearchParams(location.search);
const id    = params.get('id')   || 'P001';
const name  = params.get('name') || 'Sản phẩm';
const color = params.get('color')|| '';
const size  = params.get('size') || '';
const hex   = params.get('hex')  || '#b07d6b';
const qty   = parseInt(params.get('qty')) || 1;

// Điền thông tin UI
document.getElementById('ui-name').textContent = name;
document.getElementById('ui-meta').textContent = `${color} · Size ${size}`;
document.getElementById('ui-code').textContent = id;
document.getElementById('ui-swatch').style.background = hex;
document.getElementById('qty-in').value = qty;

function changeQty(d) {
  const inp = document.getElementById('qty-in');
  inp.value = Math.max(1, Math.min(300, parseInt(inp.value||1) + d));
  updatePreview();
}

let qrCache = null; // cache QR image data URL

function getQRDataUrl(cb) {
  if(qrCache) { cb(qrCache); return; }
  const tmp = document.createElement('div');
  tmp.style.cssText = 'position:absolute;left:-9999px;top:-9999px';
  document.body.appendChild(tmp);
  try {
    new QRCode(tmp, {
      text: id, width: 80, height: 80,
      colorDark: '#1a1a1a', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
    setTimeout(() => {
      const img = tmp.querySelector('img');
      qrCache = img ? img.src : '';
      document.body.removeChild(tmp);
      cb(qrCache);
    }, 300);
  } catch(e) {
    document.body.removeChild(tmp);
    cb('');
  }
}

function makeTem(qrSrc) {
  const shortName = name.length > 12 ? name.slice(0,11)+'…' : name;
  return `<div class="tem">
    <div class="tem-bar"><span class="tem-bar-text">LàSilk</span></div>
    <div class="tem-qr">${qrSrc ? `<img src="${qrSrc}" alt="QR">` : ''}</div>
    <div class="tem-info">
      <div class="tem-name">${shortName}</div>
      <div class="tem-color">${color} / ${size}</div>
      <div class="tem-code">${id}</div>
      <div class="tem-made">made in VN</div>
    </div>
  </div>`;
}

function updatePreview() {
  const n = Math.min(parseInt(document.getElementById('qty-in').value)||1, 300);
  getQRDataUrl((qrSrc) => {
    const tem = makeTem(qrSrc);
    // Preview: hiện tối đa 30 tem
    const previewN = Math.min(n, 30);
    document.getElementById('preview-grid').innerHTML = Array(previewN).fill(tem).join('') + (n > 30 ? `<div style="font-size:12px;color:#9a8880;padding:8px;width:100%;text-align:center">... và ${n-30} tem nữa sẽ được in</div>` : '');
    // Print grid: đủ n tem
    document.getElementById('print-grid').innerHTML = Array(n).fill(makeTem(qrSrc)).join('');
  });
}

// Khởi tạo preview
updatePreview();
</script>
</body>
</html>
